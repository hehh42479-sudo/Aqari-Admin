<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aqari Plus Admin — لوحة الإدارة</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23082949'/><text y='.9em' font-size='60' x='50%' text-anchor='middle' fill='white' font-family='Arial'>AP</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="brand-logo">
      <div class="logo-icon">AP</div>
      <h1>Aqari Plus Admin</h1>
      <p>لوحة الإدارة والأمان والتحكم</p>
    </div>
    <h2>تسجيل الدخول</h2>
    <p class="login-subtitle">أدخل رقم الجوال ثم رمز التحقق للوصول إلى لوحة الإدارة.</p>
    
    <div class="form-group">
      <label>رقم الهاتف</label>
      <input type="tel" id="phone-input" placeholder="05xxxxxxxx" inputmode="numeric">
    </div>
    <button class="btn btn-primary" id="send-otp-btn" onclick="sendOtp()">
      <span id="send-otp-text">إرسال رمز التحقق</span>
      <div id="send-otp-spinner" class="btn-spinner hidden"></div>
    </button>
    
    <div class="form-group" id="otp-group" style="opacity:0.5; pointer-events:none;">
      <label>رمز التحقق</label>
      <input type="number" id="otp-input" placeholder="xxxxxx">
      <small id="otp-helper">أرسل رمز التحقق أولاً</small>
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="login()">
      <span id="login-text">تسجيل الدخول</span>
      <div id="login-spinner" class="btn-spinner hidden"></div>
    </button>

    <div id="login-status" class="status-box hidden"></div>
    <div id="login-error" class="error-box hidden"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="admin-panel hidden">
  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">AP</div>
      <div>
        <div class="sidebar-title">Aqari Plus Admin</div>
        <div class="sidebar-subtitle" id="sidebar-role-badge">Admin Panel</div>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Items injected by JS based on permissions -->
    </nav>
    <div class="sidebar-divider"></div>
    <div class="sidebar-footer">
      <div class="user-info" id="sidebar-user-info">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-user-name">...</div>
          <div class="user-phone" id="sidebar-user-phone">...</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        تسجيل الخروج
      </button>
    </div>
  </aside>

  <!-- MOBILE TOPBAR -->
  <div class="mobile-topbar">
    <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
    <span class="mobile-title">Aqari Plus Admin</span>
  </div>
  <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="closeSidebar()"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <!-- Content loaded here by JS router -->
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
